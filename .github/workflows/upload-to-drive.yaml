name: Upload to Google Drive

on:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.GDRIVE_OAUTH }}" > ~/.config/rclone/rclone.conf

      - name: Upload files to Google Drive
        run: |
          rclone sync ./ "gdrive-personal:Research/Unsupervised-Feature-Research" \
            --exclude "data/**" \
            --exclude ".mypy_cache/**" \
            --exclude ".git/**" \
            --progress